<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration with Webcam</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .webcam-container { text-align: center; margin: 15px 0; background: #000; padding: 5px; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .flash-messages { color: red; font-weight: bold; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Candidate Registration & Verification</h2>
        <!-- Add this exactly above your <form> tag -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="color: red; font-weight: bold; text-align: center; margin-bottom: 15px;">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <div class="form-group"><label>Candidate ID:</label><input type="text" name="candidate_id" required></div>
        <div class="form-group"><label>Full Name:</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Email Address:</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Password:</label><input type="password" name="password" required></div>
        
        <label>Live Camera Preview (Photo captured on click):</label>
        <div class="webcam-container">
            <img src="/video_feed" width="100%" alt="Webcam feed initialization...">
        </div>
        
        <button type="submit">Capture Photo & Register Account</button>
    </form>
</div>
</body>
</html>
